
services:
  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: noams-nginx
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
    container_name: noams-backend
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - NOAMS_SERVER_PORT=8080
      - NOAMS_DB_DRIVER=${NOAMS_DB_DRIVER:-mysql}
      - NOAMS_DB_HOST=mysql
      - NOAMS_DB_PORT=3306
      - NOAMS_DB_USER=netops
      - NOAMS_DB_PASSWORD=${DB_PASSWORD:-netops123}
      - NOAMS_DB_NAME=netops
      - NOAMS_REDIS_ADDR=redis:6379
      - NOAMS_JWT_SECRET=${JWT_SECRET:-noams-default-jwt-secret}
      - NOAMS_NETMIKO_WORKER_URL=http://netmiko-worker:5000
    depends_on:
      mysql:
        condition: service_healthy
      netmiko-worker:
        condition: service_started
    restart: always

  netmiko-worker:
    build:
      context: ./netmiko-worker
    container_name: noams-netmiko
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
    restart: always

  mysql:
    image: mysql:8.0
    container_name: noams-mysql
    ports:
      - "3306:3306"
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root123}
      - MYSQL_DATABASE=netops
      - MYSQL_USER=netops
      - MYSQL_PASSWORD=${DB_PASSWORD:-netops123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  redis:
    image: redis:7-alpine
    container_name: noams-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mysql_data:
  redis_data:
